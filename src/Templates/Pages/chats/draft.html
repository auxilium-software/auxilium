{% extends "/Bases/StandardWebPage.html.twig" %}
{% block content %}

<div>
    <div class="inner-content">
        <div class="navigation-breadcrumb-container">
            <a class="navigation-breadcrumb" href="/dashboard">{{ "home" | uihdg }}</a>
            <a class="navigation-breadcrumb" href="">{{ "draft_message" | uihdg }}</a>
        </div>
        
        <div class="spacer"></div>
        
        <div class="loading-placeholder" id="message_draft"></div>
        <script>
            let md = (new MessageDraft("{{ draft_id }}"))
            document.getElementById("message_draft").after(md.render());
            md.focus();
            document.getElementById("message_draft").remove();
        </script>

        <!-- <div class="loading-placeholder" id="message_draft_floating"></div>
        <script>document.getElementById("message_draft_floating").after((new MessageDraft("{{ draft_id }}", true)).render()); document.getElementById("message_draft_floating").remove();</script>
        -->
        
    </div>
</div>

{% endblock %}
