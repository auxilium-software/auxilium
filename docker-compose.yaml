
services:
  ##################################################
  # AUXILIUM PORTAL
  portal:
    build:
      context: ./auxilium-portal
      target: prod
    volumes:
      - ./config.docker.yaml:/etc/auxilium/config.yaml:ro
      - formdata:/var/auxilium/formdata
      - auxlfs:/var/auxilium/auxlfs
    ports:
      - "127.0.0.1:${PORTAL_PORT:-8081}:80"
    depends_on:
      api:
        condition: service_healthy
      mariadb:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
    networks:
      - auxilium-net
    restart: unless-stopped



  ##################################################
  # AUXILIUM API
  api:
    build:
      context: ./auxilium-services--api
      target: prod
    volumes:
      - ./config.docker.yaml:/etc/auxilium/config.yaml:ro
      - formdata:/var/auxilium/formdata
      - auxlfs:/var/auxilium/auxlfs
    ports:
      - "127.0.0.1:${API_PORT:-1938}:1938"
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
    networks:
      - auxilium-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:1938/api/v3/server/ping || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s



  ##################################################
  # AUXILIUM TASK RUNNER
  task-runner:
    build:
      context: ./auxilium-services--task-runner
      target: prod
    volumes:
      - ./config.docker.yaml:/etc/auxilium/config.yaml:ro
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq-init:
        condition: service_completed_successfully
    networks:
      - auxilium-net
    restart: unless-stopped



  ##################################################
  # AUXILIUM ADMIN TOOLS
  admin-tools:
    build:
      context: ./auxilium-services--admin-tools
      target: migrate
    volumes:
      - ./config.docker.yaml:/etc/auxilium/config.yaml:ro
    networks:
      - auxilium-net
    depends_on:
      mariadb:
        condition: service_healthy
    profiles:
      - tools

  admin-tools-cli:
    build:
      context: ./auxilium-services--admin-tools
      target: prod
    volumes:
      - ./config.docker.yaml:/etc/auxilium/config.yaml:ro
    networks:
      - auxilium-net
    depends_on:
      mariadb:
        condition: service_healthy
    profiles:
      - tools



  ##################################################
  # MARIADB
  mariadb:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE:      ${MARIADB_DATABASE:-auxilium}
      MARIADB_USER:          ${MARIADB_USER:-auxilium}
      MARIADB_PASSWORD:      ${MARIADB_PASSWORD}
    volumes:
      - mariadb-data:/var/lib/mysql
    networks:
      - auxilium-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s



  ##################################################
  # RABBITMQ
  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER:  ${RABBITMQ_USER:-auxilium}
      RABBITMQ_DEFAULT_PASS:  ${RABBITMQ_PASSWORD}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-auxilium-erlang-cookie}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - auxilium-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rabbitmq-init:
    image: rabbitmq:4-management-alpine
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: >
      sh -c "
        rabbitmqctl -n rabbit@rabbitmq add_vhost Auxilium || true &&
        rabbitmqctl -n rabbit@rabbitmq set_permissions -p Auxilium ${RABBITMQ_USER:-auxilium} '.*' '.*' '.*' || true
      "
    environment:
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-auxilium-erlang-cookie}
    networks:
      - auxilium-net



volumes:
  mariadb-data:
  rabbitmq-data:
  formdata:     # FileSystem.RootStorageDirectories.FormData
  auxlfs:       # FileSystem.RootStorageDirectories.AuxLFS

networks:
  auxilium-net:
    driver: bridge
